name: ci

on:
  push:
  pull_request:
  workflow_dispatch:
jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.14", "3.13", "3.12", "3.11", "3.10"]
        include:
          - os: windows-latest
            python-version: "3.14"
          - os: macos-latest
            python-version: "3.14"

    steps:
      # - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          # cache: "pip"
      - run: pipx --version
      - run: pipx run pycowsay "preinstalled pipx run pycowsay"
      - run: pip install pycowsay pipx 
      - run: pycowsay "pip installed pycowsay"
      - run: python -m pipx --version
      - run: python -m pipx run pycowsay "pythom -m pipx run pycowsay"
